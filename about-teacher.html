<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>講師紹介 | 会員制難関受験専門塾エリオ（elio）</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans+JP:400,500,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Noto+Serif+JP:400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700&display=swap" rel="stylesheet">
    
    <style>
        html, body, div, span, h1, h2, h3, h4, h5, h6, p, blockquote, pre, a, abbr, acronym, address, big, cite, code, del, dfn, em, img, ins, kbd, q, s, samp, small, strike, strong, sub, sup, tt, var, b, u, i, center, dl, dt, dd, ol, ul, li, fieldset, form, label, legend, table, caption, tbody, tfoot, thead, tr, th, td, article, aside, canvas, details, embed, figure, figcaption, footer, header, hgroup, main, menu, nav, output, ruby, section, summary, time, mark, audio, video {
            margin: 0; padding: 0; border: 0; font: inherit; font-size: 100%; vertical-align: baseline; box-sizing: border-box;
        }
        html { font-size: 62.5%; scroll-behavior: smooth; }
        body { font-family: "Noto Serif JP", serif; font-weight: 600; font-size: 1.6rem; line-height: 1.8; color: #111; overflow-x: hidden; background: #fff; }
        
        @media screen and (max-width: 768px) { body { padding-top: 74px !important; } }

        .serif { font-family: "Noto Serif JP", serif; }
        .lora { font-family: Lora, serif; }

        .anime { opacity: 0; transition: all 1s ease; }
        .anime.bottom-in { transform: translateY(30px); }
        .active { opacity: 1 !important; transform: none !important; }

        @media screen and (min-width: 769px) {
            .sp { display: none !important; }
            .pc-frame { display: flex; align-items: flex-start; min-height: 100vh; }
            .pc-frame-left { width: 18rem; position: sticky; top: 0; height: 100vh; z-index: 1000; background: #fff; flex-shrink: 0; }
            .pc-frame-right { width: calc(100% - 18rem); flex-grow: 1; }
            .wrap { margin: 0 auto; max-width: 1060px; padding: 0 60px; }
        }

        .mv-md { height: 320px; background-color: #333; background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('img/teacher-three.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0; }
        .mv-md .wrap { width: 100%; }
        .mv-md .title-box { color: #fff; }
        .mv-md .title-box .title-line { width: 20px; height: 1px; background: #fff; margin-bottom: 2rem; }
        .mv-md .title-head { font-size: 1.8rem; margin-bottom: 1rem; letter-spacing: 0.2em; }
        .mv-md .title { font-size: 3.8rem; color: #9e9779; letter-spacing: .2em; font-weight: 300; }

        .teachers { padding: 8rem 0; }
        .teacher-details-list > li { display: flex; gap: 5rem; padding: 8rem 0; border-top: 1px solid #eee; align-items: flex-start; scroll-margin-top: 8rem; }
        .teacher-details-list > li img { width: 320px; flex-shrink: 0; }
        .teacher-details-list h2 { font-size: 3.4rem; margin-bottom: 2.5rem; }

        @media screen and (max-width: 768px) {
            .pc { display: none !important; }
            .pc-frame { display: block; }
            .pc-frame-right { width: 100%; }
            .wrap { padding: 0 25px; }
            .mv-md { height: 180px; padding: 0 2.5rem; }
            .teacher-details-list > li { flex-direction: column; gap: 3rem; padding: 5rem 0; }
            .teacher-details-list > li img { width: 100%; }
        }
    </style>
</head>
<body class="l-page l-lecturer">

    <div class="pc-frame">
        <aside id="menu-placeholder" class="pc-frame-left"></aside>

        <div class="pc-frame-right">
            <div class="bread pc">
                <div class="wrap serif" style="padding:2.5rem 0 1.5rem; font-size:1.1rem; color:#888;">HOME &gt; エリオについて &gt; 講師紹介</div>
            </div>

            <main id="contents">
                <article class="l-main serif">
                    <section class="mv-md">
                        <div class="wrap">
                            <div class="title-box anime active">
                                <div class="title-line pc"></div>
                                <p class="title-head serif">講師紹介</p>
                                <h1 class="title lora">LECTURER</h1>
                            </div>
                        </div>
                    </section>

                    <section class="teachers">
                        <div class="wrap">
                            <div class="head-text-box">
                                <h2 class="serif">難関指導実績が豊富な選抜された講師陣</h2>
                                <p class="text serif">最難関合格実績をもつ選抜された講師がお子さまの能力を見極めます。</p>
                            </div>
                            <!-- 講師リスト省略 -->
                            <ul class="teacher-details-list">
                                <li id="teacher-takeyama" class="anime bottom-in">
                                    <img src="img/teacher-takeyama.jpg" alt="竹山 隼矢">
                                    <div class="text-box">
                                        <h2 class="serif">竹山 隼矢</h2>
                                        <p class="desc serif">エリオ代表。直接指導をする受験生の第一志望校合格率は80％を超える。</p>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </section>
                    <div id="cta-placeholder"></div>
                </article>
            </main>
            <div id="footer-placeholder"></div>
        </div>
    </div>

    <script>
        async function loadPart(id, path) {
            try {
                const response = await fetch(path);
                if (response.ok) {
                    const html = await response.text();
                    const el = document.getElementById(id);
                    if (el) el.innerHTML = html;
                }
            } catch (e) { console.error('Error:', path); }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadPart('menu-placeholder', 'parts/menu.html');
            loadPart('cta-placeholder', 'parts/CTA.html');
            loadPart('footer-placeholder', 'parts/footer.html');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            
            document.querySelectorAll('.anime').forEach(el => observer.observe(el));
        });

        function toggleMenu() { document.body.classList.toggle('is-active'); }
        function toggleSubMenu(element) {
            if (window.innerWidth <= 768) {
                const parent = element.closest('.l-pulldown');
                if (parent) parent.classList.toggle('is-open');
            }
        }
    </script>
</body>
</html>
