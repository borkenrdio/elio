<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>エリオについて | 会員制難関受験専門塾エリオ（elio）</title>
    
    <link href="https://fonts.googleapis.com/css?family=Noto+Sans+JP:400,500,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Noto+Serif+JP:400,500,600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700&display=swap" rel="stylesheet">
    
    <style>
        @charset "UTF-8";
        
        html, body, div, span, h1, h2, h3, h4, h5, h6, p, blockquote, pre, a, abbr, acronym, address, big, cite, code, del, dfn, em, img, ins, kbd, q, s, samp, small, strike, strong, sub, sup, tt, var, b, u, i, center, dl, dt, dd, ol, ul, li, fieldset, form, label, legend, table, caption, tbody, tfoot, thead, tr, th, td, article, aside, canvas, details, embed, figure, figcaption, footer, header, hgroup, main, menu, nav, output, ruby, section, summary, time, mark, audio, video {
            margin: 0;
            padding: 0;
            border: 0;
            font: inherit;
            font-size: 100%;
            vertical-align: baseline;
            box-sizing: border-box;
        }

        html {
            line-height: 1;
            font-size: 62.5%;
        }

        ol, ul {
            list-style: none;
        }

        table {
            border-spacing: 0;
            border-collapse: collapse;
            width: 100%;
            max-width: 100%;
        }

        a {
            transition-duration: .5s;
            text-decoration: none;
            color: inherit;
        }

        img {
            max-width: 100%;
            height: auto;
            vertical-align: middle;
        }
        
        body {
            font-family: "Noto Sans JP", -apple-system, sans-serif;
            font-size: 1.6rem;
            line-height: 1.8;
            color: #111;
            width: 100%;
            overflow-x: hidden;
            background: #fff;
        }

        .flex { display: flex; }
        .flex.bet { justify-content: space-between; }
        .flex.vcenter { align-items: center; }
        .flex.hcenter { justify-content: center; }
        .flex.vert { flex-direction: column; }
        .flex.break { flex-wrap: wrap; }
        .flex.str { align-items: stretch; }
        .serif { font-family: "Noto Serif JP", serif; }
        .lora { font-family: Lora, serif; letter-spacing: .05em; }

        .anime { opacity: 0; }
        .anime.active { opacity: 1; }
        .bottom-in { transform: translateY(20px); transition: transform 1s, opacity 1s; }
        .active .bottom-in { transform: translateY(0); opacity: 1; }
        
        .wave1 { transition-delay: .2s; }
        .wave2 { transition-delay: .4s; }

        .md-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 1em;
            overflow: hidden;
            transition: .5s;
            cursor: pointer;
        }
        .md-btn.red { background-color: #982020; color: #fff; border: 1px solid #982020; height: 50px; min-width: 220px; }
        .md-btn.red:hover { background-color: #c22929; }
        .md-btn.black { background-color: #333; color: #fff; border: 1px solid #333; height: 70px; width: 100%; }
        .md-btn.black:hover { background-color: #111; }

        .md-btn .bar {
            position: absolute;
            top: 50%;
            right: 2rem;
            width: 1.7rem;
            height: 1px;
            background: rgba(255, 255, 255, .5);
            transform: translateY(-50%);
            transition: .5s;
        }
        .md-btn:hover .bar { right: 1rem; }

        @media screen and (min-width: 769px) {
            .sp { display: none !important; }
            .pc-frame { display: flex; min-width: 1200px; }
            .pc-frame-left { width: 16rem; position: relative; z-index: 1000; }
            .pc-frame-right { width: calc(100% - 16rem); flex-grow: 1; }
            
            .wrap {
                margin: 0 auto;
                max-width: 1060px;
                padding: 0 60px;
            }
        }

        .l-page .mv-md { padding: 8rem 0; border-top: 1px solid #eee; background: #fff; }
        .mv-md .title-box { width: 45%; }
        .mv-md .title-box .title-head { position: relative; padding-top: 2rem; font-size: 1.8rem; font-weight: 500; margin-bottom: 1rem; color: #666; }
        .mv-md .title-box .title-head:after { content: ""; position: absolute; top: 0; left: 0; width: 16px; height: 1px; background: #333; }
        .mv-md .title { font-size: 4.2rem; color: #9e9779; letter-spacing: .2em; font-weight: 300; }
        .mv-md .lead-text { width: 45%; font-size: 1.4rem; font-weight: 500; color: #333; line-height: 2; }

        .philosophy-list > li { padding: 8rem 0; border-top: 1px solid #e6e6e6; }
        .text-box { width: 45%; }
        .text-box .section-label { color: #9e9779; font-size: 1.3rem; margin-bottom: 1rem; font-family: Lora, serif; letter-spacing: 0.1em; }
        .text-box h2 { font-size: 2.8rem; font-weight: 600; margin-bottom: 3rem; color: #111; }
        .text-box .text { font-size: 1.5rem; font-weight: 500; margin-bottom: 5rem; color: #333; }
        .img-box { width: 50%; overflow: hidden; }
        .img-box img { width: 100%; transition: .8s; }
        .img-box:hover img { transform: scale(1.05); }

        @media screen and (max-width: 768px) {
            .pc { display: none !important; }
            .pc-frame-right { width: 100%; }
            .wrap { padding: 0 20px; }
            .mv-md .flex { flex-direction: column; }
            .mv-md .lead-text { width: 100%; margin-top: 3rem; }
            .philosophy-list li .flex { flex-direction: column-reverse; }
            .text-box, .img-box { width: 100%; }
            .text-box .text { width: 100%; margin-bottom: 3rem; }
        }
    </style>
</head>

<body class="l-page l-about">

    <div id="header-placeholder"></div>

    <div class="pc-frame">
        <aside id="sidebar-placeholder" class="pc pc-frame-left"></aside>

        <div class="pc-frame-right">
            <div class="bread pc">
                <div class="wrap" style="padding:15px 0; font-size:1.1rem; color:#888;">HOME > エリオについて > ABOUT US</div>
            </div>

            <main id="contents">
                <article class="l-main">
                    <section class="mv-md">
                        <div class="wrap flex bet vcenter">
                            <div class="title-box">
                                <p class="title-head">エリオについて</p>
                                <h1 class="title lora">ABOUT US</h1>
                            </div>
                            <div class="lead-text serif">
                                会員制難関受験専門塾エリオ（elio）は、優れたリーダーシップを育む、新しい塾教育を提供する学習塾です。
                            </div>
                        </div>
                    </section>

                    <section class="philosophy">
                        <div class="wrap">
                            <ul class="philosophy-list">
                                <li class="anime active">
                                    <div class="flex bet vcenter">
                                        <div class="text-box bottom-in wave1">
                                            <p class="section-label">PHILOSOPHY</p>
                                            <h2 class="serif">エリオの信念</h2>
                                            <p class="text">未来を生きる子供たちのために、エリオが取り組んでいる教育の信念についてお伝えします。</p>
                                            <a href="#" class="md-btn red">詳細を見る<div class="bar"></div></a>
                                        </div>
                                        <div class="img-box bottom-in wave2">
                                            <img src="img/facility-door.jpg" alt="信念">
                                        </div>
                                    </div>
                                </li>
                                <li class="anime active">
                                    <div class="flex bet vcenter">
                                        <div class="text-box bottom-in wave1">
                                            <p class="section-label">EDUCATOR INTRODUCTION</p>
                                            <h2 class="serif">講師紹介</h2>
                                            <p class="text">難関指導実績が豊富な選抜されたエリオの講師陣を紹介します。</p>
                                            <a href="#" class="md-btn red">詳細を見る<div class="bar"></div></a>
                                        </div>
                                        <div class="img-box bottom-in wave2">
                                            <img src="img/teacher-three.jpg" alt="講師紹介">
                                        </div>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </section>

                    <div id="cta-placeholder"></div>
                </article>
            </main>

            <div id="footer-placeholder"></div>
        </div>
    </div>

    <script>
        async function loadPart(id, path) {
            try {
                const response = await fetch(path);
                if (response.ok) {
                    const html = await response.text();
                    document.getElementById(id).innerHTML = html;
                }
            } catch (e) {
                console.error(e);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadPart('header-placeholder', 'parts/header.html');
            loadPart('sidebar-placeholder', 'parts/menu.html');
            loadPart('cta-placeholder', 'parts/CTA.html');
            loadPart('footer-placeholder', 'parts/footer.html');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });
            
            setTimeout(() => {
                document.querySelectorAll('.anime').forEach(el => observer.observe(el));
            }, 1000);
        });
    </script>
</body>
</html>
