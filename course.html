<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コース案内 | 会員制難関受験専門塾エリオ（elio）</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        html, body, div, h1, h2, h3, p, a, aside, nav, article, main, header, footer { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 62.5%; scroll-behavior: smooth; }
        body { font-family: "Noto Serif JP", serif; font-size: 1.6rem; line-height: 1.8; color: #111; background: #fff; overflow-x: hidden; }
        @media screen and (max-width: 768px) { body { padding-top: 74px !important; } }
        .serif { font-family: "Noto Serif JP", serif; }
        .lora { font-family: Lora, serif; }
        .anime { opacity: 0; transition: all 1s ease; }
        .active { opacity: 1 !important; transform: none !important; }

        @media screen and (min-width: 769px) {
            .pc-frame { display: flex; align-items: flex-start; min-height: 100vh; }
            .pc-frame-left { width: 18rem; position: sticky; top: 0; height: 100vh; background: #fff; flex-shrink: 0; }
            .pc-frame-right { width: calc(100% - 18rem); flex-grow: 1; }
            .wrap { margin: 0 auto; width: 100%; max-width: 1060px; padding: 0 60px; }
        }

        .mv-md { height: 320px; background-color: #333; background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('img/facility-classroom-1f.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; }
        .mv-md .wrap { width: 100%; }
        .mv-md .title-box { color: #fff; }
        .mv-md .title-line { width: 20px; height: 1px; background: #fff; margin-bottom: 2rem; }
        .mv-md .title { font-size: 3.8rem; color: #9e9779; letter-spacing: .2em; font-weight: 500; }

        .sec-course { background: #161616; padding: 10rem 0; color: #fff; }
        .course-list { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .course-item { background: #fff; display: flex; flex-direction: column; overflow: hidden; transition: .4s; text-decoration: none; color: #111; }
        .course-item:hover { transform: translateY(-8px); }
        .course-item .data { padding: 35px 40px; }
        .course-item .head { font-size: 2.2rem; margin-bottom: 12px; font-weight: 700; }
        .course-item .sub { color: #9e9779; font-size: 1.1rem; text-transform: uppercase; }

        @media screen and (max-width: 768px) {
            .pc { display: none !important; }
            .wrap { padding: 0 25px; }
            .mv-md { height: 180px; }
            .course-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="pc-frame">
        <aside id="menu-placeholder" class="pc-frame-left"></aside>
        <div class="pc-frame-right">
            <div class="bread pc"><div class="wrap serif" style="padding:2.5rem 0 1.5rem; font-size:1.1rem; color:#888;">HOME &gt; コース案内</div></div>
            <main id="contents">
                <section class="mv-md"><div class="wrap"><div class="title-box anime active"><div class="title-line pc"></div><p class="serif">コース案内</p><h1 class="title lora">COURSE</h1></div></div></section>
                <section class="sec-course">
                    <div class="wrap"><div class="course-list">
                        <a href="course-early-elementary-students" class="course-item anime active">
                            <img src="img/course-early-elementary-students.jpg" alt="低学年">
                            <div class="data"><span class="sub">1st to 2nd Grade</span><h3 class="head">低学年能力開発</h3><p>自ら考える力と「脳力」を育むコースです。</p></div>
                        </a>
                        <a href="course-late-elementary-students" class="course-item anime active">
                            <img src="img/course-late-elementary-students.jpg" alt="中学受験">
                            <div class="data"><span class="sub">3rd to 6th Grade</span><h3 class="head">中学受験</h3><p>難関中学合格へ向けた本質的な思考力を養います。</p></div>
                        </a>
                    </div></div>
                </section>
                <div id="cta-placeholder"></div>
            </main>
            <div id="footer-placeholder"></div>
        </div>
    </div>
    <script>
        async function loadPart(id, path) {
            const response = await fetch(path);
            if (response.ok) document.getElementById(id).innerHTML = await response.text();
        }
        window.addEventListener('DOMContentLoaded', () => {
            loadPart('menu-placeholder', 'parts/menu.html');
            loadPart('cta-placeholder', 'parts/CTA.html');
            loadPart('footer-placeholder', 'parts/footer.html');
        });
        function toggleMenu() { document.body.classList.toggle('is-active'); }
    </script>
</body>
</html>
