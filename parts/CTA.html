<style>
    /* 全体設定 */
    .cta-container {
        background: #fff;
        /* 全体を明朝体に統一 */
        font-family: "Noto Serif JP", serif;
        font-weight: 600;
    }

    /* 上部セクション（お問い合わせエリア） */
    .cta-upper {
        padding: 6rem 0 5rem;
        border-top: 1px solid #eee;
    }

    /* 左右の余白設定 */
    .cta-wrap {
        margin: 0 auto;
        max-width: 1160px;
        padding: 0 60px;
        width: 100%;
        box-sizing: border-box;
    }

    .cta-main-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 5rem;
    }

    /* 左側：見出しと説明文 */
    .cta-title-col {
        flex: 1;
    }
    .cta-title-col .dash {
        display: block;
        width: 30px;
        height: 1.5px;
        background: #333;
        margin-bottom: 1.2rem;
    }
    .cta-title-col .en {
        font-size: 3.2rem;
        color: #9e9779;
        letter-spacing: 0.15em;
        font-family: "Lora", serif;
        line-height: 1;
        margin-bottom: 0.8rem;
        font-weight: 400;
    }
    .cta-title-col .jp {
        font-size: 1.6rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 1.5rem;
        font-family: "Noto Serif JP", serif;
    }
    .cta-desc {
        font-size: 1.15rem;
        color: #555;
        line-height: 1.8;
        font-weight: 600;
        font-family: "Noto Serif JP", serif;
    }

    /* 右側：アクションエリア */
    .cta-action-col {
        width: 38rem;
        flex-shrink: 0;
    }
    .cta-tel-box {
        border: 1px solid #ddd;
        padding: 2.2rem 2.5rem;
        display: flex;
        align-items: center;
        gap: 2rem;
        margin-bottom: 1.2rem;
    }
    .cta-tel-box svg {
        width: 24px;
        height: 24px;
        color: #111;
    }
    .cta-tel-content {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .cta-tel-content .num {
        font-size: 2.4rem;
        font-weight: 700;
        font-family: "Lora", serif;
        color: #111;
        line-height: 1;
    }
    .cta-tel-content .info {
        font-size: 1rem;
        font-weight: 600;
        color: #666;
        font-family: "Noto Serif JP", serif;
    }

    .cta-btn-red {
        background: #982020;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 2.5rem 3rem;
        text-decoration: none;
        transition: background 0.3s;
        font-family: "Noto Serif JP", serif;
    }
    .cta-btn-red:hover {
        background: #b12525;
    }
    .cta-btn-red span {
        font-size: 1.5rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 1.5rem;
    }
    .cta-btn-red svg {
        width: 22px;
        height: 22px;
    }
    .cta-btn-red .bar {
        width: 20px;
        height: 1.5px;
        background: #fff;
        opacity: 0.8;
    }

    /* 下部：4つの黒ボタン（グレー背景の帯） */
    .cta-lower {
        background: #f0f0f0;
        padding: 2rem 0;
    }
    .cta-nav-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
    }
    .cta-nav-item {
        background: #333;
        color: #fff;
        padding: 2.2rem 1.2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        text-decoration: none;
        transition: all 0.3s;
        font-family: "Noto Serif JP", serif;
    }
    .cta-nav-item:hover {
        background: #000;
        transform: translateY(-3px);
    }
    .cta-nav-item svg {
        width: 28px;
        height: 28px;
        opacity: 0.9;
    }
    .cta-nav-item span {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.08em;
    }

    /* レスポンシブ調整 */
    @media screen and (max-width: 1024px) {
        .cta-upper { padding: 4rem 0; }
        .cta-wrap { padding: 0 30px; }
        .cta-main-row { flex-direction: column; gap: 3rem; align-items: center; text-align: center; }
        .cta-title-col .dash { margin: 0 auto 1.2rem; }
        .cta-action-col { width: 100%; max-width: 500px; }
        .cta-nav-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media screen and (max-width: 640px) {
        .cta-tel-content { flex-direction: column; gap: 0.8rem; }
        .cta-tel-content .num { font-size: 2rem; }
        .cta-nav-grid { grid-template-columns: 1fr; }
        .cta-btn-red { padding: 2rem; }
        .cta-btn-red span { font-size: 1.2rem; }
    }
</style>
