<style>
    /* 全体設定 */
    .cta-container {
        background: #fff;
        font-family: "Noto Serif JP", serif;
        font-weight: 600;
    }
    .cta-upper {
        padding: 6rem 0 5rem;
    }
    .cta-wrap {
        margin: 0 auto;
        max-width: 1160px;
        padding: 0 60px;
        width: 100%;
        box-sizing: border-box;
    }
    .cta-main-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 5rem;
    }
    .cta-title-col {
        flex: 1;
    }
    .cta-title-col .dash {
        display: block;
        width: 30px;
        height: 1.5px;
        background: #333;
        margin-bottom: 1.2rem;
    }
    .cta-title-col .en {
        font-size: 3.2rem;
        color: #9e9779;
        letter-spacing: 0.15em;
        font-family: "Lora", serif;
        line-height: 1;
        margin-bottom: 0.8rem;
        font-weight: 400;
    }
    .cta-title-col .jp {
        font-size: 1.6rem;
        font-weight: 700;
        color: #333;
        margin-bottom: 1.5rem;
    }
    .cta-desc {
        font-size: 1.15rem;
        color: #555;
        line-height: 1.8;
    }
    .cta-action-col {
        width: 38rem;
        flex-shrink: 0;
    }
    .cta-tel-box {
        border: 1px solid #ddd;
        padding: 2.2rem 2.5rem;
        display: flex;
        align-items: center;
        gap: 2rem;
        margin-bottom: 1.2rem;
        text-decoration: none;
        color: inherit;
        transition: background 0.3s, border-color 0.3s;
    }
    .cta-tel-box:hover {
        background: #f9f9f9;
        border-color: #bbb;
    }
    .cta-tel-box svg {
        width: 24px;
        height: 24px;
        color: #111;
    }
    .cta-tel-content {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .cta-tel-content .num {
        font-size: 2.4rem;
        font-weight: 700;
        font-family: "Lora", serif;
        color: #111;
        line-height: 1;
    }
    .cta-tel-content .info {
        font-size: 1rem;
        font-weight: 600;
        color: #666;
    }
    .cta-btn-red {
        background: #982020;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2.5rem 3rem;
        text-decoration: none;
        transition: background 0.3s;
    }
    .cta-btn-red:hover {
        background: #b12525;
    }
    .cta-btn-red span {
        font-size: 1.5rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 1.5rem;
    }
    .cta-btn-red svg {
        width: 22px;
        height: 22px;
    }
    .cta-lower {
        background: #f0f0f0;
        padding: 2rem 0;
    }
    .cta-nav-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
    }
    .cta-nav-item {
        background: #333;
        color: #fff;
        padding: 2.2rem 1.2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.2rem;
        text-decoration: none;
        transition: all 0.3s;
    }
    .cta-nav-item:hover {
        background: #000;
        transform: translateY(-3px);
    }
    .cta-nav-item svg {
        width: 28px;
        height: 28px;
        opacity: 0.9;
    }
    .cta-nav-item span {
        font-size: 1.15rem;
        font-weight: 700;
        letter-spacing: 0.08em;
    }
    @media screen and (max-width: 1024px) {
        .cta-upper { padding: 4rem 0; }
        .cta-wrap { padding: 0 30px; }
        .cta-main-row { flex-direction: column; gap: 3rem; align-items: center; text-align: center; }
        .cta-title-col .dash { margin: 0 auto 1.2rem; }
        .cta-action-col { width: 100%; max-width: 500px; }
        .cta-nav-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media screen and (max-width: 640px) {
        .cta-upper { padding: 5rem 0; }
        .cta-main-row { gap: 3.5rem; }
        .cta-title-col .jp { font-size: 2.2rem; }
        .cta-desc { font-size: 1.4rem; line-height: 1.6; }
        .cta-tel-box { 
            padding: 2.5rem 1rem; 
            gap: 1.2rem; 
            flex-direction: row; 
            justify-content: center;
        }
        .cta-tel-content { 
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: auto;
        }
        .cta-tel-content .num { 
            font-size: 2.8rem;
            line-height: 1;
            white-space: nowrap;
        } 
        .cta-tel-content .info { 
            font-size: 1.3rem; 
            margin-top: 0;
            color: #888;
            white-space: nowrap;
        }
        .cta-btn-red { padding: 2.5rem 2rem; }
        .cta-btn-red span { font-size: 1.8rem; } 
        .cta-btn-red svg { width: 24px; height: 24px; }
        .cta-nav-grid { grid-template-columns: 1fr; gap: 10px; }
        .cta-nav-item { padding: 3rem 1.5rem; }
        .cta-nav-item span { font-size: 1.6rem; }
        .cta-nav-item svg { width: 36px; height: 36px; }
    }
</style>
