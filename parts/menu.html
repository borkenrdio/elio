<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elio Sidebar Navigation</title>
    <style>
        /* 基本スタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* レイアウト基本設定 */
        .l-side {
            border-right: 1px solid #dadada;
            height: 100vh;
            position: sticky;
            top: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 18rem;
            z-index: 1000;
        }

        /* ロゴエリア */
        .l-side .logo-unit {
            padding: 1.2rem 1.5rem;
            text-align: center;
            line-height: 0;
            box-sizing: border-box;
        }
        .l-side .logo-unit a {
            display: block;
        }
        .l-side .logo-unit img {
            width: 100%;
            height: auto;
            max-width: 100%;
            display: block;
        }

        /* ナビゲーションリンク */
        .l-side .link {
            border-top: 1px solid #eee;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .l-side .link > li {
            border-bottom: 1px solid #eee;
        }
        .l-side .link .l-pulldown .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.2vh 2rem;
            font-family: "Shippori Mincho", "Noto Serif JP", serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            color: #333;
            transition: .3s;
            background: #fff;
        }
        .l-side .link .l-pulldown .head .icon {
            font-size: 0.9rem;
            color: #ccc;
            transition: .3s;
        }

        /* アクティブ時のヘッドスタイル（JavaScriptでクラスを制御） */
        .l-side .link .l-pulldown.is-active .head {
            background: #982020;
            color: #fff;
        }
        .l-side .link .l-pulldown.is-active .head .icon {
            color: #fff;
            transform: translateX(3px);
        }

        /* メガメニュー本体 */
        .l-side .link .l-pulldown .body {
            position: fixed;
            top: 0;
            left: 18rem;
            z-index: 1001;
            padding: 5rem 4rem;
            width: 48rem;
            height: 100vh;
            background: #982020;
            color: #fff;
            visibility: hidden;
            opacity: 0;
            transition: opacity .3s, transform .3s, visibility .3s;
            transform: translateX(-10px);
            overflow-y: auto;
            box-sizing: border-box;
            pointer-events: none; /* 閉じている時はイベントを無視 */
        }
        
        /* アクティブ時のボディスタイル */
        .l-side .link .l-pulldown.is-active .body {
            visibility: visible;
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto; /* 開いている時はリンクをクリック可能に */
        }

        /* タイトルテキスト */
        .menu-title {
            color: #bfa57d;
            font-family: "Shippori Mincho", "Noto Serif JP", serif;
            font-size: 2rem;
            letter-spacing: 0.15em;
            margin-bottom: 3.5rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* グリッドレイアウト */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3.5rem 2.5rem;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        /* メニューアイテム */
        .menu-item a {
            text-decoration: none;
            color: #fff;
            display: block;
        }
        .menu-item .img-box {
            margin-bottom: 1.2rem;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        .menu-item .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .6s cubic-bezier(0.2, 1, 0.3, 1);
            opacity: 1;
            image-rendering: auto;
            backface-visibility: hidden;
            transform: translateZ(0);
            will-change: transform;
        }
        .menu-item:hover .img-box img {
            transform: scale(1.04) translateZ(0);
        }

        /* ラベル */
        .menu-item .label {
            display: flex;
            align-items: center;
            font-family: "Shippori Mincho", "Noto Serif JP", serif;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }
        .menu-item .label::before {
            content: "";
            display: inline-block;
            width: 24px;
            height: 1.5px;
            background: #bfa57d;
            margin-right: 12px;
        }

        /* サイドバー下部 */
        .l-side .side-bottom {
            border-top: 1px solid #eee;
        }
        .l-side .side-tel {
            padding: 2.5vh 1.5rem;
            text-align: center;
        }
        .l-side .side-tel .label {
            display: block;
            font-size: 1rem;
            color: #666;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .l-side .side-tel .num {
            display: block;
            font-size: 2.1rem;
            font-weight: 700;
            font-family: "Lora", serif;
            color: #111;
        }
        .l-side .side-tel .time {
            display: block;
            font-size: 1.1rem;
            color: #999;
            margin-top: 0.5rem;
        }
        .l-side .side-contact-btn {
            background: #982020;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3.5vh 1rem;
            text-decoration: none;
            transition: .3s;
        }
        .l-side .side-contact-btn:hover {
            background: #b12525;
        }
        .l-side .side-contact-btn span {
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 0.8rem;
        }
    </style>
</head>
<body>

<div class="l-side">
    <div class="side-top">
        <div class="logo-unit">
            <a href="index.html"><img src="https://via.placeholder.com/200x60?text=elio+LOGO" alt="elio"></a>
        </div>

        <ul class="link">
            <li class="l-pulldown">
                <a href="about" class="head"><span>エリオについて</span> <i class="icon">❯</i></a>
                <div class="body">
                    <p class="menu-title">ABOUT US</p>
                    <ul class="menu-grid">
                        <li class="menu-item">
                            <a href="about-belief">
                                <div class="img-box"><img src="https://images.unsplash.com/photo-1541339907198-e08756ebafe3?auto=format&fit=crop&q=80&w=800" alt="エリオの信念"></div>
                                <span class="label">エリオの信念</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="about-teacher">
                                <div class="img-box"><img src="https://images.unsplash.com/photo-1524178232363-1fb28f74b0cd?auto=format&fit=crop&q=80&w=800" alt="講師紹介"></div>
                                <span class="label">講師紹介</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </li>

            <li class="l-pulldown">
                <a href="course" class="head"><span>コース案内</span> <i class="icon">❯</i></a>
                <div class="body">
                    <p class="menu-title">COURSE</p>
                    <ul class="menu-grid">
                        <li class="menu-item">
                            <a href="#course-early-elementary-students">
                                <div class="img-box"><img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&q=80&w=800" alt="小学1年生〜小学2年生"></div>
                                <span class="label">小学1年生〜小学2年生</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="course-late-elementary-students">
                                <div class="img-box"><img src="https://images.unsplash.com/photo-1497633762265-9d179a990aa6?auto=format&fit=crop&q=80&w=800" alt="小学3年生〜小学6年生"></div>
                                <span class="label">小学3年生〜小学6年生</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="course-one-on-one-instruction">
                                <div class="img-box"><img src="https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&q=80&w=800" alt="elioの個別指導"></div>
                                <span class="label">elioの個別指導</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="course-junior-and-high">
                                <div class="img-box"><img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&q=80&w=800" alt="中学生・高校生"></div>
                                <span class="label">中学生・高校生</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </li>

            <li class="l-pulldown"><a href="method" class="head"><span>学習メソッド</span> <i class="icon">❯</i></a></li>
            <li class="l-pulldown"><a href="apply" class="head"><span>入会までの流れ</span> <i class="icon">❯</i></a></li>
            <li class="l-pulldown"><a href="question" class="head"><span>よくある質問</span> <i class="icon">❯</i></a></li>
        </ul>
    </div>
    
    <div class="side-bottom">
        <div class="side-tel">
            <span class="label">総合電話窓口</span>
            <span class="num">075-231-7711</span>
            <span class="time">対応時間 13:00〜20:00</span>
        </div>
        <a href="contact" class="side-contact-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            <span>お問い合わせ・資料請求</span>
        </a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const pulldowns = document.querySelectorAll('.l-pulldown');
        const MIN_OPEN_TIME = 1000; // 最低保持時間（ミリ秒）

        pulldowns.forEach(el => {
            let openTimestamp = 0;
            let closeTimer = null;
            let isMouseOver = false;

            const openMenu = () => {
                // 他のメニューが開いている場合は即座に閉じる
                pulldowns.forEach(other => {
                    if (other !== el) other.classList.remove('is-active');
                });

                if (closeTimer) clearTimeout(closeTimer);
                
                if (!el.classList.contains('is-active')) {
                    el.classList.add('is-active');
                    openTimestamp = Date.now();
                }
            };

            const closeMenu = () => {
                const elapsed = Date.now() - openTimestamp;
                const remaining = Math.max(0, MIN_OPEN_TIME - elapsed);

                // 1秒経過していなければ残りの時間待機、経過していれば即座に（あるいは微小な遊びを持って）閉じる
                closeTimer = setTimeout(() => {
                    if (!isMouseOver) {
                        el.classList.remove('is-active');
                    }
                }, remaining);
            };

            el.addEventListener('mouseenter', () => {
                isMouseOver = true;
                openMenu();
            });

            el.addEventListener('mouseleave', () => {
                isMouseOver = false;
                closeMenu();
            });
        });
    });
</script>

</body>
</html>
