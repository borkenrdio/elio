<style>
    /* サイドバーの基本設定 */
    .l-side {
        border-right: 1px solid #dadada;
        height: 100vh;
        position: sticky;
        top: 0;
        background: #fff;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        width: 18rem;
        z-index: 1000;
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        font-family: "Noto Serif JP", serif;
    }

    .l-side .logo-unit {
        padding: 1.2rem 1.5rem;
        text-align: center;
        box-sizing: border-box;
    }
    .l-side .logo-unit img { width: 100%; height: auto; display: block; }

    .l-side .link { border-top: 1px solid #eee; padding: 0; margin: 0; list-style: none; }
    .l-side .link > li { border-bottom: 1px solid #eee; position: relative; }
    
    .l-side .link .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 2.2vh 2rem;
        font-size: 1.1rem;
        font-weight: 700;
        text-decoration: none;
        color: #333;
        transition: .3s;
        background: #fff;
        box-sizing: border-box;
        cursor: pointer;
        line-height: 1.4;
    }
    .l-side .link .head .icon { font-size: 0.8rem; color: #ccc; transition: .3s; font-style: normal; }

    .l-side .link li:hover > .head { background: #982020; color: #fff; }
    .l-side .link li:hover > .head .icon { color: #fff; transform: translateX(3px); }

    /* PC版プルダウン */
    .l-side .link .l-pulldown .body {
        position: fixed;
        top: 0;
        left: 18rem;
        z-index: 1001;
        padding: 5rem 4rem;
        width: 48rem;
        height: 100vh;
        background: #982020;
        color: #fff;
        visibility: hidden;
        opacity: 0;
        transition: opacity .3s, transform .3s, visibility .3s;
        transform: translateX(-10px);
        overflow-y: auto;
        box-sizing: border-box;
    }
    .l-side .link .l-pulldown:hover .body { visibility: visible; opacity: 1; transform: translateX(0); }

    .menu-title { color: #bfa57d; font-size: 2rem; letter-spacing: 0.15em; margin-bottom: 3.5rem; font-weight: 700; }
    .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3.5rem 2.5rem; list-style: none; padding: 0; }
    .menu-item a { text-decoration: none; display: block; }
    .menu-item .label { display: flex; align-items: center; font-size: 1.15rem; font-weight: 700; color: #fff; }
    .menu-item .label::before { content: ""; width: 24px; height: 1.5px; background: #bfa57d; margin-right: 12px; }

    .l-side .side-bottom { border-top: 1px solid #eee; }
    .l-side .side-tel { padding: 2.5vh 1.5rem; text-align: center; }
    .l-side .side-tel .label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 0.3rem; font-weight: 700; }
    .l-side .side-tel .num { display: block; font-size: 1.8rem; font-weight: 700; font-family: "Lora", serif; color: #111; text-decoration: none; }
    .l-side .side-tel .time { display: block; font-size: 0.9rem; color: #999; margin-top: 0.3rem; font-weight: 600; }
    .l-side .side-contact-btn { background: #982020; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3.5vh 1rem; text-decoration: none; transition: .3s; }
    .l-side .side-contact-btn span { font-size: 1.1rem; font-weight: 700; margin-top: 0.8rem; }

    /* モバイル表示時のスタイル調整 */
    @media screen and (max-width: 768px) {
        .l-side {
            position: fixed;
            left: 0;
            top: 74px;
            height: calc(100vh - 74px);
            transform: translateX(-100%); 
            width: 85%;
            max-width: 320px;
            z-index: 1000;
            overflow-y: auto;
            visibility: visible;
            display: flex;
            background: #fff;
        }

        /* bodyにis-activeクラスがある時に表示 */
        body.is-active .l-side {
            transform: translateX(0);
            box-shadow: 5px 0 20px rgba(0,0,0,0.15);
        }

        .l-side .logo-unit.pc { display: none; }

        .l-side .link .l-pulldown .body {
            position: static;
            width: 100%;
            height: 0;
            padding: 0;
            margin: 0;
            visibility: visible;
            opacity: 0;
            overflow: hidden;
            background: #f9f9f9;
            transition: all 0.4s ease;
            transform: none;
        }

        .l-side .link .l-pulldown.is-open .body {
            height: auto;
            padding: 1.5rem 1rem;
            opacity: 1;
        }

        .l-side .link .l-pulldown.is-open .head {
            background: #982020;
            color: #fff;
        }

        .l-side .link .l-pulldown.is-open .head .icon {
            transform: rotate(90deg);
            color: #fff;
        }

        .menu-title { font-size: 1.2rem; margin-bottom: 1.5rem; color: #982020; }
        .menu-grid { grid-template-columns: 1fr; gap: 1.2rem; }
        .menu-item .label { color: #333; font-size: 1rem; }
        .menu-item .label::before { background: #982020; width: 16px; }

        .l-side .side-tel .num { font-size: 1.5rem; }
        .l-side .side-contact-btn { padding: 2.5vh 1rem; }
    }

    /* PC版の強制表示 */
    @media screen and (min-width: 769px) {
        .l-side {
            transform: none !important;
            visibility: visible !important;
        }
    }
</style>
