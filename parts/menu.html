<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elio Sidebar Navigation</title>
    <style>
        /* 基本スタイル */
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }

        /* レイアウト基本設定 */
        .l-side {
            border-right: 1px solid #dadada;
            height: 100vh;
            position: sticky;
            top: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 18rem;
            z-index: 1000;
        }

        /* ロゴエリア */
        .l-side .logo-unit {
            padding: 2.5rem 0;
            text-align: center;
        }
        .l-side .logo-unit a {
            display: block;
        }
        .l-side .logo-unit img {
            width: 100%;
            height: auto;
            max-width: 12rem;
        }

        /* ナビゲーションリンク */
        .l-side .link {
            border-top: 1px solid #eee;
            padding: 0;
            margin: 0;
            list-style: none;
        }
        .l-side .link > li {
            border-bottom: 1px solid #eee;
        }
        .l-side .link .l-pulldown .head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.2vh 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            color: #333;
            transition: .3s;
            background: #fff;
        }
        .l-side .link .l-pulldown .head .icon {
            font-size: 0.9rem;
            color: #ccc;
            transition: .3s;
        }

        /* サイドバーホバー時 */
        .l-side .link .l-pulldown:hover .head {
            background: #982020;
            color: #fff;
        }
        .l-side .link .l-pulldown:hover .head .icon {
            color: #fff;
            transform: translateX(3px);
        }

        /* メガメニュー本体 */
        .l-side .link .l-pulldown .body {
            position: fixed;
            top: 0;
            left: 18rem;
            z-index: 1001;
            padding: 5rem 4rem;
            width: 48rem; /* 2列に合わせて幅を拡大 */
            height: 100vh;
            background: #982020; /* 深みのある赤 */
            color: #fff;
            visibility: hidden;
            opacity: 0;
            transition: .4s cubic-bezier(0.2, 1, 0.3, 1);
            transform: translateX(-10px);
            overflow-y: auto;
            box-sizing: border-box;
        }
        .l-side .link .l-pulldown:hover .body {
            visibility: visible;
            opacity: 1;
            transform: translateX(0);
        }

        /* タイトルテキスト（COURSE / ABOUT US等） */
        .menu-title {
            color: #bfa57d; /* ゴールド */
            font-family: "Shippori Mincho", "Noto Serif JP", serif;
            font-size: 2rem;
            letter-spacing: 0.15em;
            margin-bottom: 3.5rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* グリッドレイアウト（最大2項目） */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3.5rem 2.5rem;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        /* 各メニューアイテム */
        .menu-item a {
            text-decoration: none;
            color: #fff;
            display: block;
        }
        .menu-item .img-box {
            margin-bottom: 1.2rem;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16 / 9;
        }
        .menu-item .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .6s ease;
            opacity: 0.9;
        }
        .menu-item:hover .img-box img {
            transform: scale(1.08);
            opacity: 1;
        }

        /* ラベル（ゴールドの線付き） */
        .menu-item .label {
            display: flex;
            align-items: center;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .menu-item .label::before {
            content: "";
            display: inline-block;
            width: 24px;
            height: 1.5px;
            background: #bfa57d; /* ゴールドのライン */
            margin-right: 12px;
        }

        /* サイドバー下部 */
        .l-side .side-bottom {
            border-top: 1px solid #eee;
        }
        .l-side .side-tel {
            padding: 2.5vh 1.5rem;
            text-align: center;
        }
        .l-side .side-tel .label {
            display: block;
            font-size: 1rem;
            color: #666;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .l-side .side-tel .num {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            font-family: "Lora", serif;
            color: #111;
        }
        .l-side .side-tel .time {
            display: block;
            font-size: 0.85rem;
            color: #999;
            margin-top: 0.5rem;
        }
        .l-side .side-contact-btn {
            background: #982020;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3.5vh 1rem;
            text-decoration: none;
            transition: .3s;
        }
        .l-side .side-contact-btn:hover {
            background: #b12525;
        }
        .l-side .side-contact-btn span {
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 0.8rem;
        }
    </style>
</head>
<body>

<div class="l-side">
    <div class="side-top">
        <!-- ロゴエリア -->
        <div class="logo-unit">
            <a href="#"><img src="img/logo.png" alt="elio"></a>
        </div>

        <!-- ナビゲーションリンク -->
        <ul class="link">
            <li class="l-pulldown">
                <a href="#" class="head"><span>エリオについて</span> <i class="icon">❯</i></a>
                <div class="body">
                    <p class="menu-title">ABOUT US</p>
                    <ul class="menu-grid">
                        <li class="menu-item">
                            <a href="#">
                                <div class="img-box"><img src="img/facility-door.jpg" alt="エリオの信念"></div>
                                <span class="label">エリオの信念</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#">
                                <div class="img-box"><img src="img/teacher-three.jpg" alt="講師紹介"></div>
                                <span class="label">講師紹介</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </li>

            <li class="l-pulldown">
                <a href="#" class="head"><span>コース案内</span> <i class="icon">❯</i></a>
                <div class="body">
                    <p class="menu-title">COURSE</p>
                    <ul class="menu-grid">
                        <li class="menu-item">
                            <a href="#">
                                <div class="img-box"><img src="img/course-early-elementary-students.jpg" alt="小学1年生〜小学2年生"></div>
                                <span class="label">小学1年生〜小学2年生</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#">
                                <div class="img-box"><img src="img/course-late-elementary-students.jpg" alt="小学3年生〜小学6年生"></div>
                                <span class="label">小学3年生〜小学6年生</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#">
                                <div class="img-box"><img src="img/course-one-on-one-instruction.jpg" alt="elioの個別指導"></div>
                                <span class="label">elioの個別指導</span>
                            </a>
                        </li>
                        <li class="menu-item">
                            <a href="#">
                                <div class="img-box"><img src="img/course-junior-and-high.jpg" alt="中学生・高校生"></div>
                                <span class="label">中学生・高校生</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </li>

            <li class="l-pulldown"><a href="#" class="head"><span>校舎案内</span> <i class="icon">❯</i></a></li>
            <li class="l-pulldown"><a href="#" class="head"><span>学習メソッド</span> <i class="icon">❯</i></a></li>
            <li class="l-pulldown"><a href="#" class="head"><span>体験会 & 説明会</span> <i class="icon">❯</i></a></li>
        </ul>
    </div>
    
    <div class="side-bottom">
        <div class="side-tel">
            <span class="label">総合電話窓口</span>
            <span class="num">075-231-7711</span>
            <span class="time">対応時間 13:00〜20:00</span>
        </div>
        <a href="#" class="side-contact-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            <span>お問い合わせ・資料請求</span>
        </a>
    </div>
</div>

</body>
</html>
