<style>
    /* フッター全体設定 */
    .l-footer {
        background: #1a1a1a;
        color: #fff;
        padding: 6vh 0; /* 上下の余白を少し縮小 */
        min-height: 33vh; /* 画面の1/3程度の高さを確保 */
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        font-family: "Noto Sans JP", sans-serif;
        overflow: hidden; /* はみ出し防止 */
    }

    /* 左右の余白設定 */
    .l-footer .wrap {
        margin: 0 auto;
        max-width: 1400px;
        padding: 0 8% 0 8%;
        width: 100%;
        box-sizing: border-box;
    }

    /* 上部ロゴ・説明エリア */
    .foot-top-area {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 30px;
        align-items: center;
        margin-bottom: 5vh; /* メニューとの間隔を縮小 */
    }
    .foot-top-area .logo-box {
        grid-column: 1 / 2;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 2.5rem;
    }
    .foot-top-area .logo-box img {
        height: 80px; /* 全体サイズに合わせてロゴを少し調整 */
        width: auto;
    }
    .foot-top-area .logo-box .logo-text {
        font-size: 1.1rem;
        line-height: 1.6;
        color: #999;
        font-weight: 500;
        text-align: center;
        white-space: nowrap;
    }
    .foot-top-area .desc-text {
        grid-column: 2 / 5;
        font-size: 1.5rem;
        line-height: 2.2;
        color: #888;
        text-align: left;
    }

    /* メインナビゲーション */
    .footer-sitemap {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 40px;
    }
    .sitemap-col .head {
        color: #999;
        font-weight: 500;
        margin-bottom: 1.2rem;
        font-size: 1.7rem;
        letter-spacing: 0.1em;
        white-space: nowrap;
    }
    .sitemap-col .link-item {
        margin-bottom: 0.4rem;
    }
    .sitemap-col .link-item a {
        color: #999;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        gap: 1.2rem;
        padding: 0.2rem 0;
        transition: color 0.3s, transform 0.3s;
        text-decoration: none;
    }
    .sitemap-col .link-item a::before {
        content: "";
        width: 1.2rem;
        height: 1px;
        background: #444;
        flex-shrink: 0;
        transition: background 0.3s;
    }
    .sitemap-col .link-item a:hover {
        color: #fff;
        transform: translateX(5px);
    }
    .sitemap-col .link-item a:hover::before {
        background: #fff;
    }

    /* 右端：垂直テキストエリア */
    .foot-side-elements {
        position: absolute;
        right: 4%;
        top: 8%;
        bottom: 8%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        z-index: 10;
    }
    .foot-top-link {
        writing-mode: vertical-rl;
        font-size: 1.5rem;
        letter-spacing: 0.3em;
        color: #666;
        display: flex;
        align-items: center;
        gap: 2rem;
        text-decoration: none;
        transition: color 0.3s;
    }
    .foot-top-link:hover {
        color: #fff;
    }
    .foot-top-link:before {
        content: "";
        width: 1px;
        height: 60px;
        background: #333;
    }
    .foot-copy-vertical {
        writing-mode: vertical-rl;
        font-size: 1.5rem;
        color: #444;
        letter-spacing: 0.15em;
        white-space: nowrap;
    }

    /* SPレスポンシブ */
    @media screen and (max-width: 1024px) {
        .footer-sitemap {
            grid-template-columns: repeat(2, 1fr);
            gap: 40px 30px;
        }
        .l-footer .wrap {
            padding: 0 12% 0 8%;
        }
    }
    @media screen and (max-width: 768px) {
        .l-footer { padding: 6rem 0; min-height: auto; }
        .l-footer .wrap { padding: 0 25px; }
        .foot-top-area { 
            display: flex;
            flex-direction: column; 
            align-items: center;
            text-align: center;
            gap: 3rem; 
            margin-bottom: 3rem; 
        }
        .foot-top-area .logo-box {
            flex-direction: column;
        }
        .foot-top-area .logo-box .logo-text { text-align: center; }
        .foot-top-area .desc-text { text-align: center; }
        .footer-sitemap { grid-template-columns: 1fr 1fr; }
        .foot-side-elements { display: none; }
    }
</style>

    </div>

    </div>
</footer>
