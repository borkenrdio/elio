    <script>
        async function loadPart(id, path) {
            try {
                const response = await fetch(path);
                if (response.ok) {
                    const html = await response.text();
                    const el = document.getElementById(id);
                    if (el) el.innerHTML = html;
                }
            } catch (e) {
                console.error('パーツ読み込みエラー:', path);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            loadPart('header-placeholder', 'parts/header.html');
            loadPart('sidebar-placeholder', 'parts/menu.html');
            loadPart('cta-placeholder', 'parts/CTA.html');
            loadPart('footer-placeholder', 'parts/footer.html');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.anime').forEach(el => observer.observe(el));
        });
    </script>
