    <script>
        async function loadPart(id, path) {
            try {
                const response = await fetch(path);
                if (response.ok) {
                    const html = await response.text();
                    const el = document.getElementById(id);
                    if (el) el.innerHTML = html;
                }
            } catch (e) {
                console.error('読み込み失敗:', path);
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            // menu.htmlを読み込む場所を1箇所に限定することで、余白と固定の問題を同時に解決します。
            loadPart('menu-placeholder', 'parts/menu.html');
            loadPart('cta-placeholder', 'parts/CTA.html');
            loadPart('footer-placeholder', 'parts/footer.html');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.anime').forEach(el => observer.observe(el));
        });

        function toggleMenu() {
            document.body.classList.toggle('is-active');
        }
        function toggleSubMenu(element) {
            if (window.innerWidth <= 768) {
                const parent = element.closest('.l-pulldown');
                if (parent) parent.classList.toggle('is-open');
            }
        }
    </script>
